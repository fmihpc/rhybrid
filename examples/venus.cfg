save_particles = 0
mesh_always_written = yes

[LoadBalance]
methods = RCB
#methods = RANDOM
tolerances = 1.05
processes_per_partition = 2

[LogicallyCartesian]
geometry = cartesian
x_periodic = no
y_periodic = no
z_periodic = no
x_min = -18155400
y_min = -18155400
z_min = -18155400
x_max = +18155400
y_max = +18155400
z_max = +18155400
dx_uniform = yes
dy_uniform = yes
dz_uniform = yes
x_size = 120
y_size = 120
z_size = 120
x_label = x-axis
y_label = y-axis
z_label = z-axis
x_units = m
y_units = m
z_units = m
force_cubic_cells = no

